#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "cargo fmt --all"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --all-targets --all-features -- -D warnings"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "cargo-test"
name = "cargo test"
entry = "cargo test --all-features"
language = "system"
types = ["rust"]
pass_filenames = false

[[repos.hooks]]
id = "type-dir"
name = "type-dir self check"
entry = "cargo run --bin type-dir -- check"
language = "system"
pass_filenames = false

[[repos.hooks]]
id = "mdbook-build"
name = "mdbook build"
entry = "bash -c '(cd docs/book-ja && mdbook build) && (cd docs/book && mdbook build)'"
language = "system"
pass_filenames = false
files = '^(docs/|tutorials/)'
