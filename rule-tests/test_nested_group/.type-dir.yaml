version: 0

entry: root

rules:
  # nested group: the one_of alternative is itself a one_of (nested group), coexisting with a sibling file: c.txt.
  # A nested group is a non-Own alternative so it is treated as multinode, and realize is judged against the content
  # model before expansion. Because only a.txt exists, the inner one_of realizes (1), so the outer one_of also realizes (1) and the check passes.
  - rule: root
    ::
      - file: .type-dir.yaml
      - one_of:
        ::
          - one_of:
            ::
              - file: a.txt
              - file: b.txt
          - file: c.txt
