version: 0

entry: root

# Fixture demonstrating the explicit type system with with type.
# - prim_dir: receives primitive type.string / type.number params via literal values.
# - list_dirs: receives an array-type [type.string] param via a value: list binding and iterates with for.
rules:
  - rule: root
    ::
      - file: .dir-type.yaml
      # Pass a string literal and a number literal to the type.string and type.number params respectively.
      - use: rule.prim_dir
        with:
          - id: name
            value: api
          - id: version
            value: 2
      # Pass a value: list binding by reference to the array-type param.
      - id: names
        value: [alpha, beta]
      - use: rule.list_dirs
        with:
          - id: dirs
            value: ${value.names}

  # Primitive params of type.string / type.number. Builds the dir name and internal file name.
  - rule: prim_dir
    with:
      - id: name
        type: type.string
      - id: version
        type: type.number
    ::
      - dir: '${with.name}'
        ::
          - file: 'v${with.version}.txt'

  # Array param of [type.string]: iterate with for and require a dir for each element name.
  - rule: list_dirs
    with:
      - id: dirs
        type: [type.string]
    ::
      - for:
          id: d
          value: ${with.dirs}
        ::
          - dir: '${value.d}'
            ::
              - file: marker.txt
