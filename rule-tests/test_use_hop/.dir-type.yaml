version: 0
entry: root
rules:
  - rule: root
    ::
      - dir: components
        id: components_root
        ::
          - use: rule.component
            id: component
      - dir: docs
        ::
          - for:
              id: component_entry
              value: ${dir.components_root.use.component}
            ::
              - use: rule.docs
                with:
                  - id: component_entry
                    value: ${value.component_entry}
      - file: .dir-type.yaml

  - rule: component
    ::
      - dir:
          regex: '^(?<name>.+)$'
        id: component
        ::
          - file: handler.rs

  - rule: docs
    with:
      - id: component_entry
        type: rule.component
    ::
      - file: '${with.component_entry.regex.name}.md'
