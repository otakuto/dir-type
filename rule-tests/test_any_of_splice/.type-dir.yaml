version: 0

entry: root

rules:
  # any_of splice alternative. Even when the splice target is a block with multiple nodes requiring dirs,
  # it coexists with the sibling .type-dir.yaml and realizes. Because src/ exists, any_of (1 or more) is satisfied.
  - rule: root
    ::
      - file: .type-dir.yaml
      - any_of:
        ::
          - use: rule.with_src
          - use: rule.with_docs
  - rule: with_src
    ::
      - dir: src
        ::
          - file: main.rs
  - rule: with_docs
    ::
      - dir: docs
        ::
          - file: index.md
