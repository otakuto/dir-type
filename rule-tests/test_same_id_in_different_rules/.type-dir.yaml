version: 0

entry: root

# Positive case: the same id name `item` appears in two different rules.
# This must not produce SM002 (duplicate id) because each rule is its own lexical scope.
rules:
  - rule: root
    ::
      - file: .type-dir.yaml
      - dir: a
        ::
          - use: rule.slot_a
      - dir: b
        ::
          - use: rule.slot_b

  # rule slot_a uses id: item for a file named x.txt
  - rule: slot_a
    ::
      - file: x.txt
        id: item

  # rule slot_b also uses id: item for a file named y.txt
  # This collides globally but is in a different rule scope — must be accepted.
  - rule: slot_b
    ::
      - file: y.txt
        id: item
