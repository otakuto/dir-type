version: 0

entry: root

# Negative case for type mismatch: passing the non-numeric literal `oops` to a type.number param causes
# the compile-time with compatibility check (WithShapeMismatch) to fire and exit non-zero.
rules:
  - rule: root
    ::
      - file: .type-dir.yaml
      - use: rule.prim_dir
        with:
          - id: version
            value: oops

  - rule: prim_dir
    with:
      - id: version
        type: type.number
    ::
      - file: 'v${with.version}.txt'
