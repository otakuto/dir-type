version: 0

entry: root

rules:
  # Negative case: the for block requires both a.txt and b.txt, but only a.txt exists, so it does not realize.
  # The sibling c.txt also does not exist, so the outer one_of realize count is 0 and the check exits non-zero
  # (verifies that for-in-group detects violations correctly without panicking).
  - rule: root
    ::
      - file: .type-dir.yaml
      - one_of:
        ::
          - for:
              id: x
              value: [a, b]
            ::
              - file: '${value.x}.txt'
          - file: c.txt
