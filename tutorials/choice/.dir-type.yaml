version: 0

entry: root

rules:
  - rule: root
    ::
      - file: .dir-type.yaml
      - dir: docs
        ::
          # docs/ must contain 1 to 2 of: guide / api / faq (choice {min:1, max:2}).
          - choice:
            min: 1
            max: 2
            ::
              - id: guide
                file: guide.md
              - id: api
                file: api.md
              - id: faq
                file: faq.md
