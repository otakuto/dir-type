version: 0

entry: root

rules:
  - rule: root
    ::
      - file: .dir-lint.yaml
      # group: an entry with the `group:` marker key plus `id:` and `::`. It does not own a dir/file/rule;
      # instead it bundles its child entries together at the same level (without introducing a directory) as a single record named `unit`.
      - group:
        id: unit
        ::
          - file: name.txt
          - dir: data
            ::
              - file: value.txt
