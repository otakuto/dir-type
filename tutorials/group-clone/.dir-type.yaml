version: 0
entry: root
rules:
  - rule: root
    ::
      - file: .dir-type.yaml
      - dir: bundle
        id: bundle
        ::
          # Observe and collect the stem of every <stem>_left.txt (non-consuming).
          - fetch:
            id: lefts
            ::
              - file:
                  regex: '^(?<stem>[a-z]+)_left\.txt$'
          # For each left stem, realize matched only for stems where both left and right exist.
          # choice min: 0 max: 1, so a stem missing its right counterpart does not cause a violation even with 0 realizes.
          - for:
              id: candidate
              value: ${fetch.lefts}
            id: pairs
            ::
              - choice:
                id: both
                min: 0
                max: 1
                ::
                  - group:
                    id: matched
                    ::
                      - file: '${value.candidate.regex.stem}_left.txt'
                      - file: '${value.candidate.regex.stem}_right.txt'
          # Allow unpaired files (left-only / right-only) for consumption purposes (optional, so 0 matches is fine).
          - file:
              regex: '^[a-z]+_left\.txt$'
            optional: true
          - file:
              regex: '^[a-z]+_right\.txt$'
            optional: true
      - dir: pair
        ::
          # Iterate over each pair candidate collected from bundle and require pair/<stem>.txt only for stems
          # where both sides realized (both was realized). Candidates with no matched (unpaired) produce 0 iterations and no requirement.
          - for:
              id: cand
              value: ${dir.bundle.choice.pairs}
            ::
              - for:
                  id: ok
                  value: ${value.cand.choice.both.group.matched}
                ::
                  - file: '${value.cand.regex.stem}.txt'
