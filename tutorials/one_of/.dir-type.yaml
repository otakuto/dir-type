version: 0

entry: root

rules:
  - rule: root
    ::
      - file: .dir-type.yaml
      # Each [a-z] directory must contain exactly one of left.txt or right.txt (one_of).
      - dir:
          regex: '^[a-z]$'
        ::
          - one_of:
            ::
              - file: left.txt
              - file: right.txt
